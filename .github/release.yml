changelog:
  categories:
    - title: "Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "Security"
      labels:
        - "security"
    - title: "Performance"
      labels:
        - "performance"
    - title: "Maintenance"
      labels:
        - "maintenance"
        - "ci"
        - "tests"
  exclude:
    labels:
      - "chore"
      - "dependencies"
      - "documentation"
      - "docs"
