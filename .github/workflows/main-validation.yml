name: Main Validation

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: main-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-security:
    name: Quality, typing, and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev
      - run: uv run nox -s ruff
      - run: uv run nox -s mypy
      - name: Blocking Bandit medium/high gate
        run: uv run nox -s bandit
      - name: Dependency advisory report
        run: uv run nox -s safety
        continue-on-error: true

  windows-validation:
    name: Complete Windows validation
    needs: quality-security
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --frozen --extra dev
      - name: Complete tests, coverage, and deterministic performance
        run: uv run nox -s tests_full
      - name: Offscreen Qt startup smoke
        run: uv run nox -s smoke_ui
      - name: Clean Windows build
        run: uv run nox -s build_clean
      - name: Frozen artifact startup
        run: uv run nox -s artifact_smoke
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        with:
          name: SilverEstimate-windows-${{ github.run_number }}
          path: |
            coverage.xml
            perf-metrics.log
            artifacts/smoke-ui/**
            dist/SilverEstimate-v*.exe
            dist/SilverEstimate-v*-win64.zip
          if-no-files-found: error
          retention-days: 14
