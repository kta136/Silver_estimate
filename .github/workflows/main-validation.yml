name: Main Validation

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Code Quality Checks
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint and sort imports with Ruff
        run: nox -s ruff

      - name: Lint with pylint
        run: nox -s pylint
        continue-on-error: true  # Phase 0: advisory

  type-check:
    name: Type Checking
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check with mypy
        run: nox -s mypy

  test-full:
    name: Full Tests (Python 3.13)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full validation test suite
        run: nox -s tests_full

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: Security Checks
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit security checks
        run: nox -s bandit
        continue-on-error: true  # Phase 0: advisory

      - name: Check for known security vulnerabilities
        run: nox -s safety
        continue-on-error: true  # Phase 0: advisory

  build-check:
    name: Build Check
    needs: [lint-and-format, type-check, test-full, security]
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test PyInstaller build
        run: nox -s build

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilverEstimate-exe-${{ github.run_number }}
          path: dist/SilverEstimate.exe
          if-no-files-found: error
          retention-days: 14
