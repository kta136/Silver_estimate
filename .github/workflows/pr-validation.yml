name: PR Validation

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "DOCS/**"
      - "**/*.md"
      - ".editorconfig"

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-security:
    name: Quality, typing, and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - name: Sync frozen development environment
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run nox -s ruff
      - name: Mypy
        run: uv run nox -s mypy
      - name: Blocking Bandit medium/high gate
        run: uv run nox -s bandit

  windows-validation:
    name: Windows tests, smoke, performance, and package
    needs: quality-security
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - name: Sync frozen development environment
        run: uv sync --frozen --extra dev
      - name: Verify committed SQLCipher runtime
        shell: pwsh
        run: |
          uv run python scripts/verify_sqlcipher_runtime.py --wheel vendor/sqlcipher/sqlcipher3-0.6.2+silverestimate.4.17.0.1-cp314-cp314-win_amd64.whl --provenance vendor/sqlcipher/PROVENANCE.json
          uv run python scripts/verify_sqlcipher_runtime.py --provenance vendor/sqlcipher/PROVENANCE.json
      - name: Complete tests, smoke coverage, performance, and global coverage
        run: uv run nox -s tests_full
      - name: Changed-line coverage
        run: uv run diff-cover coverage.xml --compare-branch origin/main --fail-under=90
      - name: Offscreen Qt startup smoke
        run: uv run nox -s smoke_ui
      - name: PyInstaller build verification
        run: uv run nox -s build_clean
      - name: Frozen artifact startup
        run: uv run nox -s artifact_smoke
      - uses: actions/upload-artifact@v4
        with:
          name: pr-windows-verification-${{ github.run_number }}
          path: |
            coverage.xml
            perf-metrics.log
            artifacts/smoke-ui/**
            dist/SilverEstimate-v*-win64.zip
          if-no-files-found: error
          retention-days: 14
