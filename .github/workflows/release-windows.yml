name: Release Windows

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build executable (OneFile)
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --name SilverEstimate `
            --hidden-import passlib.handlers.argon2 `
            --hidden-import passlib.handlers.bcrypt `
            --hidden-import keyring.backends `
            --hidden-import keyring.backends.Windows `
            --hidden-import keyring.backends.win32 `
            --hidden-import keyring.backends.fail `
            --hidden-import keyring.backends.null `
            main.py

      - name: Rename executable with version and package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "${{ github.ref_name }}"
          $exeSrc = "dist\SilverEstimate.exe"
          if (!(Test-Path $exeSrc)) { throw 'Build did not produce dist\\SilverEstimate.exe' }
          $exeDst = "dist\SilverEstimate-$tag.exe"
          Move-Item -Force -Path $exeSrc -Destination $exeDst
          $zipName = "SilverEstimate-$tag-win64.zip"
          if (Test-Path $zipName) { Remove-Item -Force $zipName }
          Compress-Archive -Path $exeDst -DestinationPath $zipName

      - name: Generate release checksum
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = "${{ github.ref_name }}"
          $zipName = "SilverEstimate-$tag-win64.zip"
          if (!(Test-Path $zipName)) { throw "Missing release archive: $zipName" }
          $hash = (Get-FileHash -Path $zipName -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Set-Content -Path "$zipName.sha256" -NoNewline

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            SilverEstimate-${{ github.ref_name }}-win64.zip
            SilverEstimate-${{ github.ref_name }}-win64.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
