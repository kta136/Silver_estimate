# Pre-commit hooks for Silver Estimation App
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate
# Formatting policy: Ruff linting and formatting run via pre-commit locally.

repos:
  # Fast linting and import sorting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix, --config=pyproject.toml]
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, silverestimate]
        pass_filenames: false
        additional_dependencies:
          - PySide6>=6.11.1,<6.12
          - cryptography>=42.0.0
          - argon2-cffi>=21.3.0

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: [--maxkb=1000]

      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict

      # Check for merge conflicts
      - id: check-merge-conflict

      # Check YAML files
      - id: check-yaml
        exclude: ^\.github/workflows/

      # Check TOML files
      - id: check-toml

      # Check JSON files
      - id: check-json

      # Ensure files end with newline
      - id: end-of-file-fixer
        exclude: ^(graphify-out/|.*\.(md|txt)$)

      # Remove trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

      # Check for private keys
      - id: detect-private-key

      # Fix mixed line endings
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^(graphify-out/|.*\.(bat|ps1)$)

      # Check Python syntax
      - id: check-ast

      # Check for debugger imports
      - id: debug-statements

  # Security checks with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, silverestimate, -ll, -ii]
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

# Configuration for pre-commit ci (if using pre-commit.ci service)
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  submodules: false
